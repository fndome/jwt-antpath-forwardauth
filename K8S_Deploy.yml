# =============================================================================
# 部署说明
# =============================================================================
# 1. seccomp: 将 seccomp/io_uring-allowed.json 复制到所有 K8s 节点:
#      scp seccomp/io_uring-allowed.json root@node:/var/lib/kubelet/seccomp/
#
# 2. CPU: swas 含 2 个线程——IO 线程 (io_uring 事件循环) 和 Worker 线程 (请求处理)。
#    IO 线程通过 config.json 的 io_cpu 字段绑核（设为 2 即绑定 CPU 2）。
#    Worker 线程不需要绑核——host 上几十个 pod × 1 worker，内核调度器自动分配空闲核。
#    绑核目的：保证 IO 线程的延迟确定性，避免 CPU 迁移抖动。
#
# 3. 创建命名空间并部署:
#      kubectl create namespace gw
#      kubectl apply -f K8S_Deploy.yml
# =============================================================================

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-forwardauth-config
  namespace: gw
data:
  config.json: |
    {
      "server": {
        "listen_addr": "0.0.0.0:9090",
        "io_cpu": 2
      },
      "jwt": {
        "secret_key": "gaming-partner-secret-key",
        "header_key": "Authorization"
      },
      "whitelist": [
        "/health",
        "/metrics"
      ],
      "blocked_paths": [
        "/internal/**"
      ],
      "rate_limits": [
        {
          "path_pattern": "/*/public/**",
          "qps": 3000,
          "burst": 6000,
          "window_seconds": 1
        },
        {
          "path_pattern": "/im/**",
          "qps": 500,
          "burst": 1000,
          "window_seconds": 1
        },
        {
          "path_pattern": "/im-ws/**",
          "qps": 2000,
          "burst": 4000,
          "window_seconds": 1
        },
        {
          "path_pattern": "/**",
          "qps": 100,
          "burst": 200,
          "window_seconds": 1
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-antpath-forwardauth
  namespace: gw
  labels:
    app: jwt-antpath-forwardauth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jwt-antpath-forwardauth
  template:
    metadata:
      labels:
        app: jwt-antpath-forwardauth
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: Localhost
          localhostProfile: seccomp/io_uring-allowed.json
      containers:
        - name: jwt-antpath-forwardauth
          image: jwt-antpath-forwardauth:latest
          imagePullPolicy: IfNotPresent
          # IO 线程绑核由 config.json 中 server.io_cpu=2 控制（CPU 2）
          # Worker 线程不绑核，host 上几十个 worker 由内核调度器自动分配
          ports:
            - containerPort: 9090
              name: http
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: "/app/config.json"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          # Guaranteed QoS: limits == requests，节点启用 cpuManagerPolicy=static 时独占 CPU
          resources:
            requests:
              cpu: 1
              memory: 64Mi
            limits:
              cpu: 1
              memory: 64Mi
      volumes:
        - name: config-volume
          configMap:
            name: jwt-forwardauth-config
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-antpath-forwardauth-svc
  namespace: gw
spec:
  selector:
    app: jwt-antpath-forwardauth
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 9090
  type: ClusterIP
