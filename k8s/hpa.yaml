apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jwt-antpath-forwardauth
  namespace: gw
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jwt-antpath-forwardauth
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
