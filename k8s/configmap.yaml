apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-antpath-forwardauth-config
  namespace: gw
data:
  config.json: |
    {
      "server": {
        "listen_addr": "0.0.0.0:9090"
      },
      "jwt": {
        "secret_key_env": "JWT_SECRET_KEY",
        "header_key": "Authorization"
      },
      "whitelist": [
        "/health",
        "/metrics",
        "/*/public/**"
      ],
      "blocked_paths": [
        "/internal/**"
      ],
      "rate_limits": [
        {
          "path_pattern": "/*/public/**",
          "qps": 3000,
          "burst": 6000,
          "window_seconds": 1
        },
        {
          "path_pattern": "/im/**",
          "qps": 500,
          "burst": 1000,
          "window_seconds": 1
        },
        {
          "path_pattern": "/im-ws/**",
          "qps": 2000,
          "burst": 4000,
          "window_seconds": 1
        },
        {
          "path_pattern": "/**",
          "qps": 100,
          "burst": 200,
          "window_seconds": 1
        }
      ]
    }
---
# Traefik Middleware — 引用此鉴权服务
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-antpath
  namespace: gw
spec:
  forwardAuth:
    address: "http://jwt-antpath-forwardauth-svc.gw.svc.cluster.local:80"
    authRequestHeaders:
      - "Authorization"
      - "X-Forwarded-For"
      - "X-Forwarded-Proto"
    authResponseHeaders:
      - "X-User-Id"
      - "X-User-Types"
      - "X-Guild-Id"
      - "X-Is-Guild-Mgr"
